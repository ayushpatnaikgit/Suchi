<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>
  <!-- Background pill -->
  <rect width="720" height="160" rx="20" fill="url(#bg)"/>

  <!-- Bracket left -->
  <text x="80" y="100" font-family="'Georgia', 'Times New Roman', serif" font-size="72" font-weight="400" fill="#818CF8" opacity="0.7">[</text>

  <!-- Main text -->
  <text x="360" y="102" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="64" font-weight="400" fill="#FFFFFF" letter-spacing="12">suchi</text>

  <!-- Bracket right -->
  <text x="612" y="100" font-family="'Georgia', 'Times New Roman', serif" font-size="72" font-weight="400" fill="#818CF8" opacity="0.7">]</text>

  <!-- Subtle tagline -->
  <text x="360" y="138" text-anchor="middle" font-family="'Helvetica Neue', 'Arial', sans-serif" font-size="13" font-weight="300" fill="#A5B4FC" letter-spacing="5" opacity="0.6">REFERENCE MANAGER</text>
</svg>
