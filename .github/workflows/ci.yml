name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: cd backend && pip install -e ".[dev]"

      - name: Lint
        run: cd backend && ruff check src/suchi/

      - name: Test
        run: cd backend && python -m pytest tests/ -v --tb=short
        continue-on-error: true  # Tests are still being written

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Build
        run: cd frontend && npm run build

  # tauri-check: disabled until Tauri desktop app is ready for release
