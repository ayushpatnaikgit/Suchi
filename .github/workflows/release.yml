name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-python-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar-suffix: -aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
            sidecar-suffix: -x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar-suffix: -x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-suffix: -x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps + PyInstaller
        run: |
          cd backend
          pip install -e .
          pip install pyinstaller

      - name: Build Python sidecar
        run: |
          cd backend
          pyinstaller suchi-server.spec --noconfirm
        shell: bash

      - name: Rename sidecar binary
        run: |
          cd backend/dist/suchi-server
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv suchi-server.exe "suchi-server${{ matrix.sidecar-suffix }}"
          else
            mv suchi-server "suchi-server${{ matrix.sidecar-suffix }}"
          fi
        shell: bash

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: backend/dist/suchi-server/

  build-tauri:
    needs: build-python-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: src-tauri/sidecar/

      - name: Make sidecar executable
        if: runner.os != 'Windows'
        run: chmod +x src-tauri/sidecar/*

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Suchi ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            See [CHANGELOG](https://github.com/ayushpatnaikgit/Suchi/blob/main/CHANGELOG.md) for details.

            ## Installation

            | Platform | File |
            |----------|------|
            | **macOS (Apple Silicon)** | `.dmg` |
            | **macOS (Intel)** | `.dmg` |
            | **Windows** | `.exe` installer |
            | **Linux** | `.AppImage` |

            ### CLI only (no desktop app)
            ```bash
            pip install suchi
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: cd backend && python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: cd backend && twine upload dist/*
        continue-on-error: true  # Don't fail the release if PyPI upload fails
